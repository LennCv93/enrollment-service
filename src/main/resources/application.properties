spring.application.name=enrollment-service

spring.datasource.url=jdbc:postgresql://localhost:5432/enrollment_service
spring.datasource.username=homestead
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

api.base.url.user-api=http://localhost:8080
api.base.url.course-api=http://localhost:8081